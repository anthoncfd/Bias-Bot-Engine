name: BiasBot Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository head
      uses: actions/checkout@v4

    - name: Setup Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Automatically caches requirements to speed up actions runs

    - name: Upgrade core packaging utilities
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Ingest requirements allocation matrix
      run: |
        pip install -r requirements.txt

    - name: Run lint and compilation structural safety checks
      run: |
        # Compiles modules to capture hidden syntax/formatting errors before deployment
        python -m compileall app/

    # Optional Step: Uncomment if you write unit tests for your macro calculus layouts
    # - name: Execute Macro Calculus Engine tests
    #   env:
    #     TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
    #   run: |
    #     pytest
