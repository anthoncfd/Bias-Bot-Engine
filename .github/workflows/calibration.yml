name: Daily Calibration Workflow
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Initialize Runtime Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Mount Core Libraries
        run: pip install -r requirements.txt
        
      - name: Execute Walk-Forward Model Tuning Matrix
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -c "
from app.engines.prediction_evaluation import PredictionEvaluationEngine
from app.engines.calibration import save_model
assets = ['xauusd','btcusd','eurusd','gbpusd']
for asset in assets:
    try:
        model, scaler, n, cv = PredictionEvaluationEngine.walk_forward_train(asset, '1d')
        print(f'Calibration completed for asset {asset}. Data samples utilized: {n}')
    except Exception as e:
        print(f'Skipping asset nodes calibration matrix for {asset}: {e}')
"
