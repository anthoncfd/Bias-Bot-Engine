name: BiasBot Engine

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 🚀 FORCE ENABLES THE "RUN WORKFLOW" MANUAL BUTTON

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository head
      uses: actions/checkout@v4

    - name: Setup Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up execution by caching requirements matrix layers

    - name: Upgrade core packaging utilities
      run: |
        python -m pip install --upgrade pip setuptools wheel

    - name: Ingest requirements allocation matrix
      run: |
        pip install -r requirements.txt

    - name: Run lint and compilation structural safety checks
      run: |
        # Compiles modules to catch structural formatting anomalies or circular locks before deployment
        python -m compileall app/
