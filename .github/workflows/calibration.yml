name: Run Macro Bias Engine

on:
  schedule:
    # Runs at 00:00 UTC every single day (7 days a week)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger this manually directly from GitHub UI

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Bias Computations
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
        run: python engine.py
