name: Run Bias Bot Engine

on:
  workflow_dispatch: # Restricts runner to manual execution triggers only

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Engine
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Application Verification Test
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GITHUB_ACTIONS: "true"
        DEBUG: "True"
      run: |
        # Directly invokes the FastAPI lifecycle inside the runtime script context.
        # This will spin up your configuration, populate your Supabase history tables
        # using the 8-second timing intervals, and close cleanly without freezing.
        python -c "import asyncio; from app.main import app; asyncio.run(app.router.lifespan_context(app).__aenter__())"
